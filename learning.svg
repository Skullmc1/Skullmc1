<svg width="850" height="140" viewBox="0 0 850 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7" />
      <stop offset="100%" stop-color="#89b4fa" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#f9e2af" />
    </linearGradient>
    <style>
      .title { font: 700 22px 'Inter', system-ui, sans-serif; fill: #cdd6f4; }
      .text { font: 400 14px 'Inter', system-ui, sans-serif; fill: #a6adc8; }
      .bold { font-weight: 600; fill: #cdd6f4; }
    </style>
  </defs>

    <rect width="850" height="140" rx="20" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5" />
    <text x="40" y="45" class="title">Currently Learning &amp; Building ⚡</text>
    <g transform="translate(0, 70)">
      
      <g transform="translate(40, 0)">
        <rect width="240" height="45" rx="12" fill="#313244" stroke="#cba6f7" stroke-opacity="0.4" stroke-width="1.5">
           <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" begin="0s" repeatCount="indefinite" />
        </rect>
        <circle cx="20" cy="22.5" r="5" fill="#cba6f7" />
        <text x="35" y="27" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="15" fill="#cdd6f4">Web Design</text>
      </g>
    
      <g transform="translate(300, 0)">
        <rect width="240" height="45" rx="12" fill="#313244" stroke="#89b4fa" stroke-opacity="0.4" stroke-width="1.5">
           <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" begin="0.3s" repeatCount="indefinite" />
        </rect>
        <circle cx="20" cy="22.5" r="5" fill="#89b4fa" />
        <text x="35" y="27" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="15" fill="#cdd6f4">System Design</text>
      </g>
    
      <g transform="translate(560, 0)">
        <rect width="240" height="45" rx="12" fill="#313244" stroke="#f9e2af" stroke-opacity="0.4" stroke-width="1.5">
           <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" begin="0.6s" repeatCount="indefinite" />
        </rect>
        <circle cx="20" cy="22.5" r="5" fill="#f9e2af" />
        <text x="35" y="27" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="15" fill="#cdd6f4">Rust &amp; Wasm</text>
      </g>
    
    </g>
  </svg>