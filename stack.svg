<svg width="850" height="180" viewBox="0 0 850 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7" />
      <stop offset="100%" stop-color="#89b4fa" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#f9e2af" />
    </linearGradient>
    <style>
      .title { font: 700 22px 'Inter', system-ui, sans-serif; fill: #cdd6f4; }
      .text { font: 400 14px 'Inter', system-ui, sans-serif; fill: #a6adc8; }
      .bold { font-weight: 600; fill: #cdd6f4; }
    </style>
  </defs>

    <rect width="850" height="180" rx="20" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5" />
    <text x="40" y="45" class="title">Tech Stack</text>
    
      <g transform="translate(40, 70)">
