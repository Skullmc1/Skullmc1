      <text x="55" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#eee">Rust</text>
    </g>
    <g transform="translate(120, 0)">
      <rect width="110" height="40" rx="20" fill="#111" stroke="#333">
