name: Update README Visuals

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-visuals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Generate Pixel Grid
        run: bun run generate-grid.ts

      - name: Update README Timestamp
        run: bun run update-readme.ts

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md activity-grid.svg
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: refresh activity grid and timestamp [skip ci]"
            git push
          fi
