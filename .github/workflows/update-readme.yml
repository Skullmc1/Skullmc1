name: Update README

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  push:
    branches:
      - main # Or your default branch name
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Update README timestamp
        run: bun run update-readme.ts

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if there are changes. [skip ci] prevents recursive triggers.
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update last updated timestamp [skip ci]"
          git push
