<svg width="850" height="160" viewBox="0 0 850 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7" />
      <stop offset="100%" stop-color="#89b4fa" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#f9e2af" />
    </linearGradient>
    <style>
      .title { font: 700 22px 'Inter', system-ui, sans-serif; fill: #cdd6f4; }
      .text { font: 400 14px 'Inter', system-ui, sans-serif; fill: #a6adc8; }
      .bold { font-weight: 600; fill: #cdd6f4; }
    </style>
  </defs>

    <rect width="850" height="160" rx="20" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5" />
    
      <g transform="translate(40, 40)" filter="url(#shadow)">
        <rect width="180" height="90" rx="16" fill="#313244" stroke="#45475a" stroke-width="1" />
        <rect width="180" height="4" rx="2" fill="#f9e2af" />
        <text x="15" y="40" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#cdd6f4">269</text>
        <text x="15" y="70" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="#a6adc8">⭐ Total Stars</text>
      </g>
    
      <g transform="translate(235, 40)" filter="url(#shadow)">
        <rect width="180" height="90" rx="16" fill="#313244" stroke="#45475a" stroke-width="1" />
        <rect width="180" height="4" rx="2" fill="#a6e3a1" />
        <text x="15" y="40" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#cdd6f4">1337</text>
        <text x="15" y="70" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="#a6adc8">🔥 Total Commits</text>
      </g>
    
      <g transform="translate(430, 40)" filter="url(#shadow)">
        <rect width="180" height="90" rx="16" fill="#313244" stroke="#45475a" stroke-width="1" />
        <rect width="180" height="4" rx="2" fill="#89b4fa" />
        <text x="15" y="40" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#cdd6f4">89</text>
        <text x="15" y="70" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="#a6adc8">🚀 Pull Requests</text>
      </g>
    
      <g transform="translate(625, 40)" filter="url(#shadow)">
        <rect width="180" height="90" rx="16" fill="#313244" stroke="#45475a" stroke-width="1" />
        <rect width="180" height="4" rx="2" fill="#f38ba8" />
        <text x="15" y="40" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#cdd6f4">12</text>
        <text x="15" y="70" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="#a6adc8">🎯 Issues</text>
      </g>
    
  </svg>